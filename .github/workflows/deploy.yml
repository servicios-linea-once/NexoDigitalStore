name: 🚀 Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:  # Permite lanzar manualmente desde GitHub

concurrency:
  group: production-deploy
  cancel-in-progress: false  # No cancelar un deploy en curso

jobs:
  deploy:
    name: Deploy → VPS
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # ── 1. Checkout (solo para validar que el push funciona) ──────────────
      - name: Checkout código
        uses: actions/checkout@v4

      # ── 2. Deploy via SSH ─────────────────────────────────────────────────
      - name: Deploy en VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script_stop: true
          script: |
            set -euo pipefail

            APP_DIR="/var/www/nexokeys"
            APP_USER="root"
            PHP_VERSION="8.3"
            GIT_BRANCH="main"

            # Colores para logs de GitHub Actions
            echo "::group::📥 Actualizando código"
            cd "$APP_DIR"
            git fetch origin "$GIT_BRANCH"
            git reset --hard "origin/$GIT_BRANCH"
            echo "::endgroup::"

            echo "::group::🔧 Dependencias PHP"
            composer install \
              --no-dev \
              --optimize-autoloader \
              --no-interaction \
              --prefer-dist \
              --quiet
            echo "::endgroup::"

            echo "::group::🎨 Compilando assets"
            npm ci --silent
            npm run build
            echo "::endgroup::"

            echo "::group::🗄️ Migraciones"
            php artisan migrate --force
            echo "::endgroup::"

            echo "::group::⚡ Optimizando Laravel"
            php artisan optimize:clear
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan event:cache
            php artisan ziggy:generate
            echo "::endgroup::"

            echo "::group::🔑 Permisos"
            chown -R root:www-data "$APP_DIR"
            chmod -R 755 "$APP_DIR"
            chmod -R 775 "${APP_DIR}/storage" "${APP_DIR}/bootstrap/cache"
            chmod 600 "${APP_DIR}/.env"
            echo "::endgroup::"

            echo "::group::🔄 Reiniciando servicios"
            systemctl reload php${PHP_VERSION}-fpm
            php artisan queue:restart
            supervisorctl reread 2>/dev/null || true
            supervisorctl update 2>/dev/null || true
            supervisorctl restart nexo-horizon:* 2>/dev/null || true
            echo "::endgroup::"

            echo ""
            echo "✅ Deploy completado — $(date '+%Y-%m-%d %H:%M:%S')"

      # ── 3. Notificación de éxito ──────────────────────────────────────────
      - name: Notificación de éxito
        if: success()
        run: |
          echo "✅ Deploy exitoso a producción"
          echo "Commit: ${{ github.sha }}"
          echo "Autor: ${{ github.actor }}"

      # ── 4. Notificación de fallo ──────────────────────────────────────────
      - name: Notificación de fallo
        if: failure()
        run: |
          echo "❌ Deploy FALLIDO"
          echo "Commit: ${{ github.sha }}"
          echo "Revisar logs arriba para más detalles"
