# ══════════════════════════════════════════════════════════════════════════════
# Nexo Digital Store — Nginx config para VPS
# Ruta destino: /etc/nginx/sites-available/nexokeys
# Symlink:      ln -s /etc/nginx/sites-available/nexokeys /etc/nginx/sites-enabled/nexokeys
#
# Variables a reemplazar:
#   TU_DOMINIO  → tu dominio real, ej: nexokeys.com
#   TU_USUARIO  → usuario Linux de la app, ej: nexo
# ══════════════════════════════════════════════════════════════════════════════

# Redirigir HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name TU_DOMINIO www.TU_DOMINIO;

    # Permitir validación de Certbot
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Servidor principal HTTPS
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;

    server_name TU_DOMINIO www.TU_DOMINIO;
    root /var/www/nexokeys/public;
    index index.php;

    # ── SSL (gestionado por Certbot) ──────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/TU_DOMINIO/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/TU_DOMINIO/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Límites ───────────────────────────────────────────────────────────────
    client_max_body_size 20M;

    # ── Cabeceras de seguridad ────────────────────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"                    always;
    add_header X-Content-Type-Options    "nosniff"                       always;
    add_header X-XSS-Protection          "1; mode=block"                 always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Gzip ──────────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml
        image/svg+xml font/woff font/woff2;
    gzip_min_length 1024;

    # ── Rutas ─────────────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    # ── PHP-FPM ───────────────────────────────────────────────────────────────
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param PATH_INFO       $fastcgi_path_info;
        fastcgi_read_timeout          300;
        fastcgi_buffers               16 16k;
        fastcgi_buffer_size           32k;
        fastcgi_hide_header           X-Powered-By;
    }

    # ── Assets estáticos (caché 1 año) ────────────────────────────────────────
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Bloquear acceso a archivos sensibles ──────────────────────────────────
    location ~ /\. {
        deny all;
    }

    location ~ ^/(storage/app|bootstrap/cache|composer\.(json|lock)|package\.json|\.env) {
        deny all;
        return 404;
    }

    # ── WebSockets (Laravel Reverb) — descomenta si lo usas ──────────────────
    # location /app {
    #     proxy_pass         http://127.0.0.1:8080;
    #     proxy_http_version 1.1;
    #     proxy_set_header   Upgrade    $http_upgrade;
    #     proxy_set_header   Connection "Upgrade";
    #     proxy_set_header   Host       $host;
    # }

    # ── Logs ──────────────────────────────────────────────────────────────────
    access_log /var/log/nginx/nexokeys.access.log;
    error_log  /var/log/nginx/nexokeys.error.log warn;
}
